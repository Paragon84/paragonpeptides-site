<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - Paragon Peptides</title>
  <meta name="robots" content="index, follow">
  <!-- Supabase MUST load first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #000000; color: #e2e8f0; }
    h1, h2, h3 { font-family: 'Satoshi', sans-serif; }
    .modal { animation: modalPop 0.3s ease-out; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="antialiased" x-data="app()" x-init="init()">

<div x-show="isLoading" class="fixed inset-0 bg-black flex items-center justify-center z-50">
  <div class="text-center">
    <div class="w-12 h-12 border-4 border-[#ff1493] border-t-transparent rounded-full animate-spin mx-auto"></div>
    <p class="mt-4 text-white">Loading product...</p>
  </div>
</div>

<div x-show="!isLoading && product" class="max-w-6xl mx-auto px-6 py-12">
  <button @click="window.location.href='/'" class="mb-8 text-[#ff1493] hover:underline">← Back to Shop</button>
  
  <div class="grid md:grid-cols-2 gap-12">
    <img :src="product.image" :alt="product.name" class="w-full rounded-3xl shadow-2xl" @error="$el.src='https://i.imgur.com/jXQlcWB.png'">
    
    <div>
      <h1 class="text-5xl font-bold text-white" x-text="product.name"></h1>
      <p class="text-[#ff1493] text-2xl mt-2" x-text="product.desc"></p>

      <!-- Dose selector -->
      <div class="mt-8">
        <label class="block text-sm text-zinc-400 mb-3">SELECT DOSE</label>
        <div class="grid grid-cols-3 gap-3">
          <template x-for="v in product.doses" :key="v.mg || v.ml">
            <button @click="selectedDose = (v.mg || v.ml); price = v.price"
                    :class="selectedDose === (v.mg || v.ml) ? 'bg-[#ff1493] text-white' : 'bg-zinc-800'"
                    class="py-4 rounded-2xl font-bold text-lg" 
                    x-text="(v.mg || v.ml) + (v.mg ? 'mg' : 'ml')"></button>
          </template>
        </div>
      </div>

      <div class="mt-10 text-5xl font-bold text-white" x-text="'$' + price"></div>
      
      <button @click="addToCart()" 
              class="mt-8 w-full bg-[#ff1493] hover:bg-pink-600 py-5 rounded-3xl font-bold text-xl">
        ADD TO CART
      </button>
    </div>
  </div>

  <div class="mt-16 prose prose-invert max-w-none" x-html="product.fullDesc"></div>
</div>

<script>
function app() {
  return {
    product: null,
    selectedDose: null,
    price: 0,
    isLoading: true,
    supabase: null,

    async init() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = parseInt(urlParams.get('id'));

      this.supabase = supabase.createClient(
        'https://lydlmgzavepcdtreeoto.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZGxtZ3phdmVwY2R0cmVlb3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDA3MTksImV4cCI6MjA4OTQxNjcxOX0.-F_lSkO6_Wz4-FnNwsPkib-k31_xEe5sgrC4WDaOOSk'
      );

      const { data } = await this.supabase.from('products').select('*');
      this.product = data.find(p => p.id === id);

      if (this.product) {
        const firstDose = this.product.doses[0];
        this.selectedDose = firstDose.mg || firstDose.ml;
        this.price = firstDose.price;
      }

      this.isLoading = false;
    },

    addToCart() {
      if (!this.product || !this.selectedDose) return alert("Select a dose first");
      const variant = this.product.doses.find(v => (v.mg || v.ml) === this.selectedDose);
      
      let cart = JSON.parse(localStorage.getItem('paragonCart') || '[]');
      const existing = cart.find(i => i.id === this.product.id && i.dose === this.selectedDose);
      
      if (existing) existing.qty++;
      else cart.push({ ...this.product, dose: this.selectedDose, price: variant.price, qty: 1 });

      localStorage.setItem('paragonCart', JSON.stringify(cart));
      alert("Added to cart! Go back to shop to checkout.");
    }
  };
}
</script>
</body>
</html>
